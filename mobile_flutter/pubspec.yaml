name: saveit
description: SaveIt — cross-platform product bookmarking app
publish_to: 'none'
version: 1.4.0+17

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # Navigation
  go_router: ^14.6.3

  # State management
  provider: ^6.1.5

  # Images
  cached_network_image: ^3.4.1

  # URL handling
  url_launcher: ^6.3.1

  # Native share sheet
  share_plus: ^10.1.4

  # Receive shared content from other apps
  receive_sharing_intent: ^1.8.1

  # Google Sign-In
  google_sign_in: ^7.2.0

  # Relative timestamps
  timeago: ^3.7.0

  # Icons
  cupertino_icons: ^1.0.8

  # HTTP (used for Supabase recover endpoint workaround)
  http: ^1.2.0

  # SHA-256 for Google Sign-In nonce hashing
  crypto: ^3.0.0

  # App version for settings screen
  package_info_plus: ^8.0.0

  # Camera + gallery picker for in-store item capture
  image_picker: ^1.1.2

  # GPS for in-store item capture
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
