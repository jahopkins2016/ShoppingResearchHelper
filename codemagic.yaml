workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile_flutter
    integrations:
      app_store_connect: Codemagic  # Name of your App Store Connect API key in Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jahopkins.saveit
      groups:
        - saveit_env  # Environment variable group in Codemagic containing SUPABASE_URL and SUPABASE_ANON_KEY
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build iOS
        script: |
          flutter build ipa \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SaveIt Testers
