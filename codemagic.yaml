workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile_flutter
    integrations:
      app_store_connect: Codemagic  # Name of your App Store Connect API key in Codemagic
    environment:
      groups:
        - saveit_env  # Environment variable group in Codemagic containing SUPABASE_URL and SUPABASE_ANON_KEY
      vars:
        BUNDLE_ID: "com.jahopkins.saveit"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Write certificate private key
        script: |
          # CERTIFICATE_PRIVATE_KEY must be defined in the saveit_env group
          # (paste the full PEM including BEGIN/END lines).
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "CERTIFICATE_PRIVATE_KEY env var is not set" >&2
            exit 1
          fi
          printf '%s' "$CERTIFICATE_PRIVATE_KEY" > /tmp/certificate_key
          chmod 600 /tmp/certificate_key
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.jahopkins.saveit \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/certificate_key \
            --create
          app-store-connect fetch-signing-files com.jahopkins.saveit.ShareExtension \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/certificate_key \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate Flutter iOS config
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build iOS
        script: |
          flutter build ipa \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SaveIt Testers

  android-release:
    name: Android Release (APK + AAB)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile_flutter
    environment:
      groups:
        - saveit_env  # SUPABASE_URL, SUPABASE_ANON_KEY (and optionally CM_KEYSTORE_* for signed release)
      vars:
        PACKAGE_NAME: "com.saveit.saveit"
      flutter: stable
      java: 17
    scripts:
      - name: Restore debug keystore
        script: |
          # ANDROID_DEBUG_KEYSTORE_B64 must be in the saveit_env group.
          # This ensures Google Sign-In works — the SHA-1 matches what's
          # registered in Google Cloud Console.
          if [ -z "$ANDROID_DEBUG_KEYSTORE_B64" ]; then
            echo "ANDROID_DEBUG_KEYSTORE_B64 env var is not set" >&2
            exit 1
          fi
          mkdir -p ~/.android
          # Strip whitespace/newlines before decoding — pasted values from the
          # Codemagic UI often include wrap breaks that macOS's strict base64
          # decoder rejects (producing invalid keystore bytes).
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_B64" \
            | tr -d '[:space:]' \
            | openssl base64 -d -A > ~/.android/debug.keystore
          # Verify decoded keystore is a valid keystore: JKS (magic FEEDFEED)
          # or PKCS12 (ASN.1 SEQUENCE, starts with 0x30 0x82).
          MAGIC=$(head -c 4 ~/.android/debug.keystore | xxd -p)
          case "$MAGIC" in
            feedfeed*|3082*) ;;
            *)
              echo "Decoded keystore is not a valid JKS/PKCS12 file (magic: $MAGIC). Check ANDROID_DEBUG_KEYSTORE_B64." >&2
              ls -la ~/.android/debug.keystore >&2
              head -c 32 ~/.android/debug.keystore | xxd >&2 || true
              exit 1
              ;;
          esac
          echo "Debug keystore restored successfully ($(wc -c < ~/.android/debug.keystore) bytes)"
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey | grep -E 'SHA1|SHA-1' || true
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter build Android APK
        script: |
          flutter build apk \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      - name: Flutter build Android AAB
        script: |
          flutter build appbundle \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
