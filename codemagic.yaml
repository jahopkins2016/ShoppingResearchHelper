workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile_flutter
    integrations:
      app_store_connect: Codemagic  # Name of your App Store Connect API key in Codemagic
    environment:
      groups:
        - saveit_env  # Environment variable group in Codemagic containing SUPABASE_URL and SUPABASE_ANON_KEY
      vars:
        BUNDLE_ID: "com.jahopkins.saveit"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Write certificate private key
        script: |
          # CERTIFICATE_PRIVATE_KEY must be defined in the saveit_env group
          # (paste the full PEM including BEGIN/END lines).
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "CERTIFICATE_PRIVATE_KEY env var is not set" >&2
            exit 1
          fi
          printf '%s' "$CERTIFICATE_PRIVATE_KEY" > /tmp/certificate_key
          chmod 600 /tmp/certificate_key
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.jahopkins.saveit \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/certificate_key \
            --create
          app-store-connect fetch-signing-files com.jahopkins.saveit.ShareExtension \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/certificate_key \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate Flutter iOS config
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build iOS
        script: |
          flutter build ipa \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SaveIt Testers

  android-release:
    name: Android Release (APK + AAB)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile_flutter
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      groups:
        - saveit_env  # SUPABASE_URL, SUPABASE_ANON_KEY (and optionally CM_KEYSTORE_* for signed release)
      vars:
        PACKAGE_NAME: "com.saveit.saveit"
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter build Android APK
        script: |
          flutter build apk \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      - name: Flutter build Android AAB
        script: |
          flutter build appbundle \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
