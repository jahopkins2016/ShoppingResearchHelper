workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile_flutter
    integrations:
      app_store_connect: Codemagic  # Name of your App Store Connect API key in Codemagic
    environment:
      groups:
        - saveit_env  # Environment variable group in Codemagic containing SUPABASE_URL and SUPABASE_ANON_KEY
      vars:
        BUNDLE_ID: "com.jahopkins.saveit"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Generate certificate private key
        script: |
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/certificate_key -q -N ""
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.jahopkins.saveit \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/certificate_key \
            --create
          app-store-connect fetch-signing-files com.jahopkins.saveit.ShareExtension \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/certificate_key \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Generate Flutter iOS config
        script: |
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter build iOS
        script: |
          flutter build ipa \
            --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - SaveIt Testers
